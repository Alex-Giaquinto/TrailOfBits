---
- name: Deploy Logan Kicking Academy to S3 and invalidate CloudFront
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    site_dir: "{{ playbook_dir }}/../logan_kicking_academy"
    s3_bucket: "logan-kicking-academy"
    cloudfront_distribution_id: "{{ lookup('env', 'LOGAN_KICKING_ACADEMY_DISTRIBUTION_ID') }}"

  tasks:
    - name: Sync files to S3
      community.aws.s3_sync:
        bucket: "{{ s3_bucket }}"
        file_root: "{{ site_dir }}"
        delete: true

    - name: Invalidate CloudFront cache
      community.aws.cloudfront_invalidation:
        distribution_id: "{{ cloudfront_distribution_id }}"
        target_paths:
          - "/*"
